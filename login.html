<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Dr. John Smith</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="auth-page">
  <div class="container">
    <div class="auth-card mx-auto">
      <!-- Logo -->
      <div class="text-center mb-4">
        <div style="width:60px;height:60px;background:var(--blue-600);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem;">🏥</div>
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your patient portal</p>
      </div>

      <form id="loginForm" onsubmit="doLogin(event)">
        <div class="mb-3">
          <label class="form-label">Email Address *</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label" style="display:flex;justify-content:space-between;">
            Password *
            <a href="#" style="color:var(--blue-500);font-size:0.82rem;font-weight:500;">Forgot password?</a>
          </label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="loginPass" placeholder="••••••••" required>
            <button type="button" onclick="togglePass('loginPass', this)" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:0.9rem;">👁</button>
          </div>
        </div>
        <div class="mb-4 d-flex align-items-center gap-2">
          <input type="checkbox" id="remember" style="accent-color:var(--blue-600);">
          <label for="remember" style="font-size:0.85rem;color:var(--gray-600);">Keep me signed in</label>
        </div>
        <button type="submit" class="btn-primary-blue w-100 justify-content-center">Sign In</button>
      </form>

      <div class="auth-divider"><span>or sign in with</span></div>

      <div class="d-flex gap-2 mb-4">
        <button onclick="socialLogin('Google')" style="flex:1;padding:0.6rem;border:1.5px solid var(--gray-200);border-radius:10px;background:white;cursor:pointer;font-size:0.85rem;font-family:var(--font-body);color:var(--gray-700);transition:border-color 0.2s;" onmouseover="this.style.borderColor='var(--blue-400)'" onmouseout="this.style.borderColor='var(--gray-200)'">🔵 Google</button>
        <button onclick="socialLogin('Apple')" style="flex:1;padding:0.6rem;border:1.5px solid var(--gray-200);border-radius:10px;background:white;cursor:pointer;font-size:0.85rem;font-family:var(--font-body);color:var(--gray-700);transition:border-color 0.2s;" onmouseover="this.style.borderColor='var(--blue-400)'" onmouseout="this.style.borderColor='var(--gray-200)'">🍎 Apple</button>
        <button onclick="socialLogin('Microsoft')" style="flex:1;padding:0.6rem;border:1.5px solid var(--gray-200);border-radius:10px;background:white;cursor:pointer;font-size:0.85rem;font-family:var(--font-body);color:var(--gray-700);transition:border-color 0.2s;" onmouseover="this.style.borderColor='var(--blue-400)'" onmouseout="this.style.borderColor='var(--gray-200)'">🪟 Microsoft</button>
      </div>

      <p style="text-align:center;font-size:0.88rem;color:var(--gray-500);">
        Don't have an account? <a href="signup.html" style="color:var(--blue-500);font-weight:600;">Create account</a>
      </p>

      <!-- Demo credentials note -->
      <div style="background:var(--blue-50);border:1px solid var(--blue-200);border-radius:10px;padding:0.9rem;margin-top:1.5rem;font-size:0.82rem;color:var(--blue-700);">
        <strong>Demo:</strong> Use any email + password (6+ chars) to log in. This is a frontend-only demo.
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/components.js"></script>
<script>
function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;

  if (pass.length < 6) { showToast('Password must be at least 6 characters.', 'error'); return; }

  const name = email.split('@')[0].replace(/[^a-z]/gi,' ').trim();
  const capitalized = name.charAt(0).toUpperCase() + name.slice(1);
  Auth.login(capitalized, email);
  showToast(`Welcome back, ${capitalized}! 👋`, 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 900);
}

function socialLogin(provider) {
  Auth.login('Demo User', 'demo@drjohnsmith.com');
  showToast(`Signed in with ${provider}!`, 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 900);
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}
</script>
</body>
</html>
