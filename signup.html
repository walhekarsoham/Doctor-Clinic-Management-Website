<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Dr. John Smith</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="nav-placeholder"></div>

<div class="auth-page">
  <div class="container">
    <div class="auth-card mx-auto" style="max-width:520px;">
      <div class="text-center mb-4">
        <div style="width:60px;height:60px;background:var(--blue-600);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 1rem;">🏥</div>
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join thousands of patients managing their health online</p>
      </div>

      <form id="signupForm" onsubmit="doSignup(event)">
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">First Name *</label>
            <input type="text" class="form-control" id="firstName" placeholder="John" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name *</label>
            <input type="text" class="form-control" id="lastName" placeholder="Smith" required>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Email Address *</label>
          <input type="email" class="form-control" id="signupEmail" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="tel" class="form-control" placeholder="(555) 000-0000">
        </div>
        <div class="mb-3">
          <label class="form-label">Date of Birth *</label>
          <input type="date" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password *</label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="signupPass" placeholder="Min. 8 characters" required>
            <button type="button" onclick="togglePass('signupPass', this)" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--gray-400);cursor:pointer;">👁</button>
          </div>
          <!-- Password strength -->
          <div id="passStrength" style="margin-top:8px;height:4px;background:var(--gray-200);border-radius:10px;overflow:hidden;display:none;">
            <div id="strengthBar" style="height:100%;transition:width 0.3s,background 0.3s;"></div>
          </div>
          <div id="strengthText" style="font-size:0.75rem;margin-top:4px;"></div>
        </div>
        <div class="mb-4">
          <label class="form-label">Confirm Password *</label>
          <input type="password" class="form-control" id="confirmPass" placeholder="Re-enter password" required>
        </div>
        <div class="mb-4">
          <select class="form-select">
            <option value="">Primary Care Need (optional)</option>
            <option>General Medicine</option>
            <option>Cardiology</option>
            <option>Neurology</option>
            <option>Pediatrics</option>
            <option>Orthopedics</option>
          </select>
        </div>
        <div class="mb-3 d-flex align-items-start gap-2">
          <input type="checkbox" id="terms" required style="margin-top:3px;accent-color:var(--blue-600);">
          <label for="terms" style="font-size:0.84rem;color:var(--gray-600);">I agree to the <a href="#" style="color:var(--blue-500);">Terms of Service</a> and <a href="#" style="color:var(--blue-500);">Privacy Policy</a></label>
        </div>
        <div class="mb-4 d-flex align-items-start gap-2">
          <input type="checkbox" id="marketing" style="margin-top:3px;accent-color:var(--blue-600);">
          <label for="marketing" style="font-size:0.84rem;color:var(--gray-600);">Send me health tips and appointment reminders via email (optional)</label>
        </div>
        <button type="submit" class="btn-primary-blue w-100 justify-content-center">Create My Account</button>
      </form>

      <p style="text-align:center;font-size:0.88rem;color:var(--gray-500);margin-top:1.5rem;">
        Already have an account? <a href="login.html" style="color:var(--blue-500);font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/components.js"></script>
<script>
function doSignup(e) {
  e.preventDefault();
  const first = document.getElementById('firstName').value.trim();
  const last = document.getElementById('lastName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPass').value;
  const confirm = document.getElementById('confirmPass').value;

  if (pass.length < 8) { showToast('Password must be at least 8 characters.', 'error'); return; }
  if (pass !== confirm) { showToast('Passwords do not match.', 'error'); return; }

  Auth.login(`${first} ${last}`, email);
  showToast(`Account created! Welcome, ${first}! 🎉`, 'success');
  setTimeout(() => window.location.href = 'dashboard.html', 900);
}

function togglePass(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

// Password strength indicator
document.getElementById('signupPass').addEventListener('input', function() {
  const v = this.value;
  const bar = document.getElementById('strengthBar');
  const text = document.getElementById('strengthText');
  const wrap = document.getElementById('passStrength');

  if (!v) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;

  const levels = [
    { label: 'Very Weak', color: '#ef4444', width: '20%' },
    { label: 'Weak', color: '#f97316', width: '40%' },
    { label: 'Fair', color: '#eab308', width: '60%' },
    { label: 'Strong', color: '#22c55e', width: '80%' },
    { label: 'Very Strong', color: '#16a34a', width: '100%' },
  ];
  const level = levels[Math.min(score, 4)];
  bar.style.width = level.width;
  bar.style.background = level.color;
  text.textContent = level.label;
  text.style.color = level.color;
});
</script>
</body>
</html>
